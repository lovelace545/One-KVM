name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 代码检查和测试
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get vcpkg
        run: |
          mkdir -p res
          git clone --depth=1 https://github.com/microsoft/vcpkg.git res/vcpkg
          # 国内如果 GitHub 慢，可以用下面这行 Gitee 镜像
          # git clone --depth=1 https://gitee.com/mirrors/vcpkg.git res/vcpkg

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake nasm pkg-config libudev-dev libasound2-dev libssl-dev

      - name: Bootstrap vcpkg
        run: |
          cd res/vcpkg
          chmod +x bootstrap-vcpkg.sh
          ./bootstrap-vcpkg.sh
          ./vcpkg integrate instal

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check code
        run: cargo check --all-features

      - name: Run tests
        run: cargo test --all-features --lib

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

