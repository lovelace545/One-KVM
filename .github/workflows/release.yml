name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 构建多平台版本
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: one-kvm-x86_64-linux
            
          # ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: one-kvm-aarch64-linux
            use_cross: true
            
          # ARMv7
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            asset_name: one-kvm-armv7-linux
            use_cross: true
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross
      
      - name: Install dependencies
        if: matrix.os == 'ubuntu-latest' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      
      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/${{ matrix.target }}/release/one-kvm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建最终的发布包
  create-release-assets:
    name: Create Release Assets
    runs-on: ubuntu-latest
    needs: [ build-release ]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create checksums
        run: |
          mkdir -p release
          for artifact in */one-kvm-*; do
            if [ -f "$artifact" ]; then
              cp "$artifact" release/
              sha256sum "release/$(basename $artifact)" >> release/SHA256SUMS
            fi
          done
      
      - name: Upload checksums
        uses: softprops/action-gh-release@v1
        with:
          files: release/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
